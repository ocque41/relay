version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [deps]
    groups:
      next:
        patterns: ['next', 'react', 'react-dom', '@types/react', '@types/react-dom']
      hono:
        patterns: ['hono', '@hono/*']
      drizzle:
        patterns: ['drizzle-orm', 'drizzle-kit']
  - package-ecosystem: npm
    directory: /packages/server-sdk
    schedule:
      interval: weekly
    labels: [deps, sdk]
  - package-ecosystem: npm
    directory: /packages/cli
    schedule:
      interval: weekly
    labels: [deps, cli]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [deps, ci]
